<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xingrui Yang</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        body {
            background-color: #2d2d2d;
            background-image: 
                linear-gradient(45deg, #333 25%, transparent 25%), 
                linear-gradient(-45deg, #333 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #333 75%), 
                linear-gradient(-45deg, transparent 75%, #333 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            font-family: 'Press Start 2P', cursive;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* CRT 显示器扫描线效果 - subtle */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                rgba(30, 41, 59, 0) 50%, 
                rgba(30, 41, 59, 0.06) 50%
            );
            background-size: 100% 6px;
            pointer-events: none;
            z-index: 10;
        }

        .card-container {
            position: relative;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .pixel-card {
            background: #f4f4f4;
            box-shadow: 
                0 0 0 4px #fff,
                0 0 0 8px #000,
                8px 8px 0 8px rgba(30,41,59,0.5);
            padding: 30px;
            max-width: 500px;
            width: 100%;
            position: relative;
            image-rendering: pixelated;
        }

        .avatar-section {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .avatar-container {
            display: inline-block;
            position: relative;
            padding: 8px;
        }

        .avatar {
            width: 120px;
            height: 120px;
            object-fit: cover;
            display: block;
            border: 4px solid #fff;
            filter: contrast(1.1);
        }

        .name-section {
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }

        .name {
            font-size: 18px;
            color: #000;
            margin-bottom: 10px;
            line-height: 1.4;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .underline {
            width: 60px;
            height: 4px;
            background: #000;
            margin: 0 auto;
            position: relative;
            box-shadow: 2px 2px 0 rgba(30,41,59,0.2);
        }

        .underline::before,
        .underline::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 4px;
            background: #ff6b6b;
        }

        .underline::before { left: -8px; }
        .underline::after { right: -8px; }

        .info-section {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: #fff;
            border: 3px solid #000;
            box-shadow: 3px 3px 0 rgba(30,41,59,0.2);
            transition: all 0.1s;
            text-decoration: none;
            color: #000;
            font-size: 10px;
            position: relative;
            overflow: hidden;
        }

        .info-item:hover {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0 rgba(30,41,59,0.2);
            background: #f0f0f0;
        }

        .info-item:active {
            transform: translate(3px, 3px);
            box-shadow: 0 0 0 rgba(30,41,59,0.2);
        }

        /* 悬停时的像素闪烁效果 */
        .info-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg, 
                transparent, 
                rgba(255,255,255,0.8), 
                transparent
            );
            transition: left 0.5s;
        }

        .info-item:hover::before {
            left: 100%;
        }

        .icon {
            width: 24px;
            height: 24px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 12px;
            flex-shrink: 0;
        }

        .email-icon::before { content: '@'; }
        .scholar-icon::before { content: 'S'; }
        .github-icon::before { content: 'G'; }
        .twitter-icon::before { content: 'T'; }

        .info-text {
            word-break: break-all;
            line-height: 1.5;
        }

        /* 装饰性像素角标 */
        .corner {
            position: absolute;
            width: 16px;
            height: 16px;
            border: 4px solid #000;
        }

        .corner-tl { top: -8px; left: -8px; border-right: none; border-bottom: none; }
        .corner-tr { top: -8px; right: -8px; border-left: none; border-bottom: none; }
        .corner-bl { bottom: -8px; left: -8px; border-right: none; border-top: none; }
        .corner-br { bottom: -8px; right: -8px; border-left: none; border-top: none; }

        /* 闪烁光标效果 */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 16px;
            background: #000;
            margin-left: 5px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        /* 响应式调整 */
        @media (max-width: 480px) {
            .pixel-card {
                padding: 20px;
            }
            .name {
                font-size: 14px;
            }
            .info-item {
                font-size: 8px;
                padding: 10px;
            }
            .avatar {
                width: 100px;
                height: 100px;
            }
        }

        /* 版权信息 */
        .footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            color: #888;
            font-size: 8px;
            text-shadow: 1px 1px 0 #000;
            z-index: 5;
        }

        .footer a {
            color: #4ecdc4;
            text-decoration: none;
        }

        .footer a:hover {
            color: #ff6b6b;
        }

        /* 加载动画 */
        .loading-text {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 12px;
            animation: fadeOut 0.5s ease-out 1s forwards;
            pointer-events: none;
            z-index: 100;
        }

        @keyframes fadeOut {
            to { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="card-container">
        <div class="pixel-card">
            <div class="corner corner-tl"></div>
            <div class="corner corner-tr"></div>
            <div class="corner corner-bl"></div>
            <div class="corner corner-br"></div>

            <div class="avatar-section">
                <div class="avatar-container">
                    <!-- 你可以将 src 替换为自己的照片 -->
                    <img src="./profiel.png" 
                         alt="Xingrui Yang" 
                         class="avatar">
                </div>
            </div>

            <div class="name-section">
                <h1 class="name">Xingrui Yang<span class="cursor"></span></h1>
                <div class="underline"></div>
            </div>

            <div class="info-section">
                <a href="mailto:yangxingrui@cardc.cn" class="info-item">
                    <div class="icon email-icon"></div>
                    <span class="info-text">contact me</span>
                </a>

                <a href="https://scholar.google.com/citations?user=FyrG7D0AAAAJ&hl=en" target="_blank" class="info-item">
                    <div class="icon scholar-icon"></div>
                    <span class="info-text">Google Scholar</span>
                </a>

                <a href="https://github.com/xingruiy" target="_blank" class="info-item">
                    <div class="icon github-icon"></div>
                    <span class="info-text">github.com/xingruiy</span>
                </a>

                <a href="https://twitter.com/xingrui_y" target="_blank" class="info-item">
                    <div class="icon twitter-icon"></div>
                    <span class="info-text">@xingrui_y</span>
                </a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Xingrui Yang. All rights reserved.</p>
    </footer>

    <script>
        // 添加打字机效果
        document.addEventListener('DOMContentLoaded', () => {
            const name = document.querySelector('.name');
            const originalText = name.textContent.replace('', '');
            name.innerHTML = '<span class="cursor"></span>';
            
            let i = 0;
            const typeWriter = () => {
                if (i < originalText.length) {
                    name.innerHTML = originalText.substring(0, i + 1) + '<span class="cursor"></span>';
                    i++;
                    setTimeout(typeWriter, 100);
                } else {
                    name.innerHTML = originalText + '<span class="cursor"></span>';
                }
            };
            
            setTimeout(typeWriter, 500);

            // 添加8-bit音效模拟（视觉反馈）
            const items = document.querySelectorAll('.info-item');
            items.forEach(item => {
                item.addEventListener('mouseenter', () => {
                    item.style.transform = 'translate(2px, 2px) scale(0.98)';
                });
                item.addEventListener('mouseleave', () => {
                    item.style.transform = 'translate(0, 0) scale(1)';
                });
                item.addEventListener('click', (e) => {
                    // 创建点击波纹效果
                    const ripple = document.createElement('div');
                    ripple.style.position = 'absolute';
                    ripple.style.width = '4px';
                    ripple.style.height = '4px';
                    ripple.style.background = '#000';
                    ripple.style.left = e.offsetX + 'px';
                    ripple.style.top = e.offsetY + 'px';
                    ripple.style.pointerEvents = 'none';
                    ripple.style.animation = 'ripple 0.3s linear';
                    item.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 300);
                });
            });
        });

        // 添加CSS动画关键帧
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: scale(20);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
